    <meta charset="utf-8">

    <meta name="description" content="Robotics CAP 的贡献和提案入口。">
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html" aria-label="Robotics CAP 首页">
        <span class="brand-mark">CAP</span>
        <span>Robotics CAP</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a href="../roadmap.html">路线图</a>
        <a href="../concepts.html">概念书</a>
        <a href="../ideas/">想法库</a>
        <a href="../previews/">预览</a>
        <a class="active" href="./">提案</a>
      </nav>
    </header>

    <main>
      <section class="page-hero compact">
        <p class="eyebrow">Proposals</p>
        <h1>把新方向先写成可讨论的入口。</h1>
        <p class="lead">
          提案页用于收集值得讨论的公开方向：新场景、新概念、新展示方式或新的外部链接。
          它帮助评审者看清楚变化，而不是在生成目录里找差异。
        </p>
      </section>

      <section class="timeline" aria-label="提案流程">
        <article class="milestone">
          <div class="milestone-index">01</div>
          <div>
            <h2>写清楚目的</h2>
            <p>说明这个提案要补充哪段叙事、服务哪类读者、是否适合公开分享。</p>
          </div>
        </article>
        <article class="milestone">
          <div class="milestone-index">02</div>
          <div>
            <h2>放到正确栏目</h2>
            <p>概念进入想法库，演示摘要进入预览页，整体阶段调整进入路线图。</p>
          </div>
        </article>
        <article class="milestone">
          <div class="milestone-index">03</div>
          <div>
            <h2>链接外部实现</h2>
            <p>需要完整 demo、分支预览或权限控制的内容，链接到实现仓库或受保护平台。</p>
          </div>
        </article>
      </section>
    </main>

    <footer class="footer">
      <span>Robotics CAP</span>
      <a href="../index.html">返回首页</a>
    </footer>
  </body>
