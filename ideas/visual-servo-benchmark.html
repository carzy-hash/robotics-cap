    <main>
      <section class="page-hero compact">
        <p class="eyebrow">Benchmark</p>
        <h1>视觉伺服 benchmark 应该测模型能不能把观察变成正确的调整。</h1>
        <p class="lead">
          只识别物体不够。机器人需要知道如何平移、旋转、换视角、处理遮挡，
          以及什么时候应该停止而不是继续随机尝试。
        </p>
      </section>

      <section class="framework-grid">
        <article>
          <h2>先测平移</h2>
          <p>物体偏左、偏右、偏上或偏下时，模型是否能给出稳定的相机或末端移动方向。</p>
        </article>
        <article>
          <h2>再测旋转</h2>
          <p>需要看侧面、背面或特定角度时，模型是否能选择正确旋转方向和观察策略。</p>
        </article>
        <article>
          <h2>最后测恢复</h2>
          <p>遇到遮挡、目标丢失或视角冲突时，模型是否会换视角、请求补充观察或停止。</p>
        </article>
      </section>
    </main>
