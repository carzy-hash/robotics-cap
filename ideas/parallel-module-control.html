    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html" aria-label="Robotics CAP 首页">
        <span class="brand-mark">CAP</span>
        <span>Robotics CAP</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a href="../roadmap.html">路线图</a>

        <a class="active" href="./">想法库</a>
        <a href="../previews/">预览</a>
      </nav>
    </header>

    <main>
      <section class="page-hero compact">
        <p class="eyebrow">Robot migration</p>
        <h1>多模块机器人可以由多个局部代码块协作，而不是一个动作输出管到底。</h1>
        <p class="lead">
          左手、右手、头部和相机都可以拥有自己的局部流程。它们通过少量事件协作：
          暂停、重试、换视角、确认和终止。
        </p>
      </section>

      <section class="timeline">
        <article class="milestone">
          <div class="milestone-index">01</div>
          <div>
            <h2>局部负责</h2>
            <p>每个代码块只操作自己负责的关节子集或观察器。</p>
          </div>
        </article>
        <article class="milestone">
          <div class="milestone-index">02</div>
          <div>
            <h2>事件协作</h2>
            <p>模块之间不共享所有内部状态，只发送清楚的中断、确认和补充观察。</p>
          </div>
        </article>
        <article class="milestone">
          <div class="milestone-index">03</div>
          <div>
            <h2>整体收束</h2>
            <p>顶层策略只负责协调目标和停止条件，让局部模块保持可替换。</p>
          </div>
        </article>
      </section>
    </main>

    <footer class="footer">
